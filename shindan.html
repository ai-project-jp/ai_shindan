<!DOCTYPE html>
<html lang="ja">
<head>
　　 <meta name="apple-mobile-web-app-capable" content="yes">
　　 <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIサバイバル診断 | 才能を輝かせるプレミアム・パートナー</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourname.github.io/ai_shindan/shindan.html"> 
    <meta property="og:title" content="AIサバイバル診断 | あなたの才能を輝かせるプレミアム・パートナー">
    <meta property="og:description" content="2026年、AIと共に生きる。5つの質問で、今のあなたに最適なAIツールセットと、あなたの『才能の磨き方』を提案します。">
    <meta property="og:image" content="image_0.png"> 
    <meta property="og:site_name" content="AIサバイバル診断">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        :root { --primary: #0047ab; --gold: #d4af37; --text-main: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #000; color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; }
        
        /* 背景レイヤー：Unsplashの写真で世界観を作る */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 2s ease-in-out; z-index: -1; opacity: 0; }
        .bg-layer.active { opacity: 1; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)); z-index: -1; }
        
        .container { 
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); 
            border: 1px solid rgba(255, 255, 255, 0.4); width: 92%; max-width: 600px; padding: 3rem 2.5rem; border-radius: 1.5rem; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.25); text-align: center; position: relative; max-height: 95vh; overflow-y: auto;
        }

        /* ★タイトルロゴ画像（image_0.png）の迫力設定★ */
        h1.main-title { 
            margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: center; min-height: 180px; 
        }
        h1.main-title img { 
            width: 85%; /* 横幅を大きく確保 */
            max-width: 450px; /* PCで見ても大きすぎない上限 */
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5)); /* 影を強くして浮かび上がらせる */
        }

        .question-text { font-size: 1.35rem; font-weight: 700; margin-bottom: 2.5rem; line-height: 1.7; color: #111; min-height: 4rem; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .options { display: grid; gap: 1.2rem; }
        
        button.option-btn { 
            background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(255, 255, 255, 0.8); 
            padding: 1.4rem; border-radius: 1rem; font-size: 1.1rem; font-weight: 700; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); color: #000;
        }
        button.option-btn:hover { background: rgba(255, 255, 255, 0.95); border-color: var(--primary); color: var(--primary); transform: translateY(-3px); }

        /* 結果画面のスタイル */
        .result-view { display: none; text-align: left; animation: fadeIn 1.2s ease; }
        .result-header { text-align: center; margin-bottom: 1.5rem; }
        .result-label { font-size: 0.75rem; font-weight: 900; color: #64748b; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 0.4rem; display: block; }
        .result-type-name { font-size: 1.8rem; font-weight: 900; color: var(--gold); line-height: 1.3; }

        .type-desc { 
            font-size: 1rem; line-height: 2; color: #1a1a1a; margin-bottom: 2.5rem; 
            padding: 1.5rem; background: rgba(255,255,255,0.3); border-radius: 1rem;
            font-weight: 500; text-align: left;
        }
        
        .tool-stack-header { text-align: center; margin-bottom: 1.5rem; }
        .stack-title { font-weight: 900; font-size: 0.8rem; color: var(--primary); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.4rem; }
        .stack-subtitle { font-weight: 700; font-size: 0.9rem; color: #475569; letter-spacing: 0.05em; }

        .tool-card { background: rgba(255, 255, 255, 0.9); border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid rgba(255, 255, 255, 0.5); display: flex; align-items: center; gap: 1.2rem; text-decoration: none; color: inherit; transition: all 0.3s ease; }
        .tool-card:hover { transform: translateY(-5px); background: white; border-color: var(--primary); }
        .tool-logo { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; background: #f1f5f9; object-fit: contain; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .tool-name { font-weight: 900; color: var(--primary); font-size: 1.1rem; margin-bottom: 0.2rem; display: block; }
        .tool-reason { font-size: 0.85rem; color: #475569; line-height: 1.5; }

        .sub-recommend-title { font-weight: 800; font-size: 0.75rem; color: #64748b; margin: 1.5rem 0 0.8rem; text-align: center; letter-spacing: 0.1em; }
        .sub-tool-container { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .sub-tool-link { background: rgba(255, 255, 255, 0.6); padding: 0.6rem 1rem; border-radius: 50px; font-size: 0.8rem; font-weight: 700; color: #475569; text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.8); transition: 0.3s; display: flex; align-items: center; gap: 0.5rem; }
        .sub-tool-link:hover { background: var(--primary); color: white; transform: scale(1.05); }
        .sub-icon { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }

        .manifesto-box { background: rgba(255, 255, 255, 0.98); padding: 2.5rem 2rem; border-radius: 1.5rem; margin: 3rem 0; text-align: left; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-top: 3px solid var(--gold); border-bottom: 3px solid var(--gold); position: relative; }
        .manifesto-text { font-size: 1.1rem; line-height: 2; font-weight: 700; color: #1a1a1a; }
        .manifesto-box::before { content: 'MESSAGE'; position: absolute; top: -12px; left: 20px; background: var(--gold); color: white; padding: 2px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div id="bg-overlay-layers">
    <div id="bg0" class="bg-layer active" style="background-image: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=2000');"></div>
    <div id="bg1" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2000');"></div>
    <div id="bg2" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2000');"></div>
    <div id="bg3" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000');"></div>
    <div id="bg4" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=2000');"></div>
    <div id="bg5" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2000');"></div>
</div>
<div class="bg-overlay"></div>

<div class="container">
    <div id="quiz">
        <h1 class="main-title">
            <img src="image_0.png" alt="AIサバイバル診断">
        </h1>
        <p class="question-text" id="q-text"></p>
        <div class="options" id="options"></div>
    </div>

    <div id="result" class="result-view">
        <div class="result-header">
            <span class="result-label">YOUR TYPE</span>
            <span class="result-type-name" id="result-type"></span>
        </div>
        <div class="type-desc" id="type-explanation"></div>
        <div class="tool-stack-header">
            <p class="stack-title">Premium AI Technology Stack</p>
            <p class="stack-subtitle">あなたにおすすめするAIツールはこちら</p>
        </div>
        <div id="tool-list"></div>
        <p class="sub-recommend-title">さらに可能性を広げる＋αツール</p>
        <div id="sub-tool-list" class="sub-tool-container"></div>
        <div class="manifesto-box">
            <p class="manifesto-text">あなたにしか出来ないこと、成し得ないことがあります。自分らしく働く上でAIを活用する、そしてより自分が輝ける社会を創っていきましょう。</p>
        </div>
        <button onclick="location.reload()" style="display: block; margin: 3rem auto 1rem; background: none; border: none; color: #777; cursor: pointer; text-decoration: underline; font-weight: 500;">最初からやり直す</button>
    </div>
</div>

<script>
    const logos = {
        claude: "claude.png", mj: "midjourney.png", chatgpt: "chatgpt.png",
        make: "make.png", gemini: "gemini.png", gamma: "gamma.png",
        notion: "notion.png", canva: "canva.png", per: "perplexity.png"
    };

    const questions = [
        { text: "Q1. 仕事で一番「楽しい」と感じる瞬間は？", options: ["ゼロからアイデアを練る時", "情報を整理し仕組み化する時", "誰かの悩みを解決する時"], scores: [10, 20, 30] },
        { text: "Q2. AIに任せて「楽」になりたい作業は？", options: ["下調べや初稿の作成", "事務やスケジュール管理", "画像や動画のデザイン制作"], scores: [1, 2, 3] },
        { text: "Q3. 困難に直面した時、どう乗り越える？", options: ["直感と感性で突破する", "論理的に分析して解決する", "周囲と協力して乗り越える"], scores: [10, 20, 30] },
        { text: "Q4. あなたが社会に提供したい価値は？", options: ["まだ見ぬ新しい驚き", "圧倒的な効率と正確さ", "温かい繋がりと安心感"], scores: [100, 200, 300] },
        { text: "Q5. 5年後、どんな働き方をしていたい？", options: ["センス一本で自由に生きる", "チームで大きな変革を起こす", "大切な人と豊かに過ごす"], scores: [100, 200, 300] }
    ];

    let currentIdx = 0; let totalScore = 0;

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.text;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => { totalScore += q.scores[i]; next(); };
            optContainer.appendChild(btn);
        });
    }

    function next() {
        document.getElementById(`bg${currentIdx}`).classList.remove('active');
        currentIdx++;
        if(document.getElementById(`bg${currentIdx}`)) document.getElementById(`bg${currentIdx}`).classList.add('active');
        setTimeout(() => { if (currentIdx < questions.length) { renderQuestion(); } else { showResult(); } }, 200);
    }

    async function sendLogToSheet(type, score) {
        const url = "https://script.google.com/macros/s/AKfycbzQM6O0tOe968B-0cfaeofygoyk2KuMcZX6B0ovAEA7olNTRuGY3opylB2VjszsZ7nf/exec"; 
        const data = { type: type, score: score };
        try { fetch(url, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) }); } catch (e) { }
    }

    function showResult() {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        let res = { type: "", desc: "", tools: [], subTools: [] };

       if (totalScore < 300) {
            res.type = "感性のクリエイティブ・マスター";
            res.desc = "あなたは独自のセンスと直感を武器に、ゼロから価値を生み出す表現者です。AIを単なる効率化の道具ではなく、自分の感性を拡張する「共創パートナー」として位置づけることで、あなたの創造力は100倍に加速します。言語化できない微細なニュアンスをAIに投げ込み、何度も対話を重ねることで、自分一人では到達できなかった未知の表現領域へと踏み出すことが可能です。感性を磨く時間こそが、あなたの最大の資産になります。";
            res.tools = [
                { name: "Claude 3.5 Sonnet", reason: "あなたの繊細な感性や『行間』を読み取り、高精度な壁打ち相手として機能します。", url: "https://claude.ai/", logo: logos.claude },
                { name: "Midjourney", reason: "頭の中にある抽象的なイメージや空気感を、言葉（プロンプト）を通じて圧倒的なアートへと昇華させます。", url: "https://www.midjourney.com/", logo: logos.mj }
            ];
            res.subTools = [{ name: "Canva AI (デザイン)", logo: logos.canva }, { name: "Notion AI (執筆)", logo: logos.notion }];
        } else if (totalScore < 500) {
            res.type = "信頼のロジカル・アーキテクト";
            res.desc = "あなたは複雑な情報を整理し、淀みのない仕組みを構築する設計者です。散らばったデータを構造化し、最短距離で最適解を導き出す能力に長けています。AIを活用して徹底的な自動化と情報の要約を極めることで、日々のルーチンワークから完全に解放され、より本質的な「戦略構築」や「新しい仕組みの創造」に没頭できる環境を作り出すことができます。あなたが構築するシステムそのものが、周囲にとっての強力な武器となるはずです。";
            res.tools = [
                { name: "ChatGPT (GPT-4o)", reason: "膨大な情報の要約、データの構造化、プログラミングまで。論理的な思考を補完する最強の頭脳です。", url: "https://chatgpt.com/", logo: logos.chatgpt },
                { name: "Make", reason: "複数のツールをシームレスに連携させ、あなた専用の全自動ワークフロー（仕組み）を実現します。", url: "https://www.make.com/", logo: logos.make }
            ];
            res.subTools = [{ name: "Perplexity (リサーチ)", logo: logos.per }, { name: "Notion (ナレッジ管理)", logo: logos.notion }];
        } else {
            res.type = "共感のビジョナリー・リーダー";
            res.desc = "あなたは人々の想いを結びつけ、未来のビジョンを指し示す先導者です。多様な意見を統合し、チームが向かうべき方向をポジティブに提示する力を持っています。AIを多角的な視点を持つ「アドバイザー」や、ビジョンを即座に視覚化する「デザイナー」として活用することで、あなたのリーダーシップはより説得力を増し、周囲を強力に巻き込んでいきます。AIで効率化した時間を「対話」に注ぐことで、より大きな社会変革を現実のものにするでしょう。";
            res.tools = [
                { name: "Google Gemini", reason: "Google Workspaceとの高度な連携により、チームの情報共有と意思決定を劇的にスムーズにします。", url: "https://gemini.google.com/", logo: logos.gemini },
                { name: "Gamma", reason: "キーワードを入力するだけで、あなたの情熱的なビジョンを洗練されたプレゼン資料へと瞬時に変換します。", url: "https://gamma.app/", logo: logos.gamma }
            ];
            res.subTools = [{ name: "Canva (プレゼン)", logo: logos.canva }, { name: "ChatGPT (コーチング)", logo: logos.chatgpt }];
        }

        document.getElementById('result-type').innerText = res.type;
        document.getElementById('type-explanation').innerText = res.desc;
        const list = document.getElementById('tool-list');
        list.innerHTML = "";
        res.tools.forEach(t => {
            list.innerHTML += `<a href="${t.url}" target="_blank" class="tool-card"><img src="${t.logo}" alt="${t.name}" class="tool-logo"><div class="tool-info"><span class="tool-name">${t.name}</span><p class="tool-reason">${t.reason}</p></div></a>`;
        });
        const subList = document.getElementById('sub-tool-list');
        subList.innerHTML = "";
        res.subTools.forEach(st => {
            subList.innerHTML += `<a href="${st.url}" target="_blank" class="sub-tool-link"><img src="${st.logo}" alt="" class="sub-icon">${st.name}</a>`;
        });
        sendLogToSheet(res.type, totalScore);
    }
    renderQuestion();
</script>
</body>
</html>
